<!DOCTYPE html>
<html>

<head>
<title>Math Club Posters</title>

<style>

body{
font-family: Arial;
text-align:center;
background:black;
color:white;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:30px;
}

.scratch-card{
position:relative;
width:300px;
height:420px;
}

.poster{
width:100%;
height:100%;
border-radius:10px;
}

canvas{
position:absolute;
top:0;
left:0;
border-radius:10px;
}

video{
margin-top:40px;
width:600px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>Math Club Posters</h1>
<p>Scratch to reveal the posters</p>

<div class="container">

<div class="scratch-card">
<img src="poster1.jpg" class="poster">
<canvas></canvas>
</div>

<div class="scratch-card">
<img src="poster2.jpg" class="poster">
<canvas></canvas>
</div>

<div class="scratch-card">
<img src="poster3.jpg" class="poster">
<canvas></canvas>
</div>

<div class="scratch-card">
<img src="poster4.jpg" class="poster">
<canvas></canvas>
</div>

</div>

<h2>Watch the Explanation Video</h2>

<video controls>
<source src="video.mp4" type="video/mp4">
</video>

<script>

document.querySelectorAll("canvas").forEach(canvas => {

const ctx = canvas.getContext("2d")
canvas.width = 300
canvas.height = 420

ctx.fillStyle = "gray"
ctx.fillRect(0,0,canvas.width,canvas.height)

canvas.addEventListener("mousemove", scratch)
canvas.addEventListener("touchmove", scratch)

function scratch(e){

let rect = canvas.getBoundingClientRect()

let x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left
let y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top

ctx.globalCompositeOperation = "destination-out"
ctx.beginPath()
ctx.arc(x,y,20,0,Math.PI*2)
ctx.fill()

}

})

</script>

</body>
</html>
