<!DOCTYPE html>
<html>

<head>
<title>Math Club Posters</title>

<style>

body{
font-family: Arial, sans-serif;
text-align:center;
background:#0d1117;
color:white;
margin:0;
padding:20px;
}

h1{
margin-top:10px;
}

p{
color:#c9d1d9;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
margin-top:30px;
}

img{
width:280px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.6);
transition: transform 0.3s ease;
}

img:hover{
transform:scale(1.08);
}

.video-section{
margin-top:60px;
}

video{
width:80%;
max-width:700px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.6);
}

</style>

</head>

<body>

<h1>Math Club Posters</h1>
<p>Explore the mathematics behind real world ideas</p>

<div class="container">

<img src="poster1.jpg">
<img src="poster2.jpg">
<img src="poster3.jpg">
<img src="poster4.jpg">

</div>

<div class="video-section">

<h2>Watch the Explanation Video</h2>

<video controls>
<source src="video.mp4" type="video/mp4">
</video>

</div>

</body>

</html>
