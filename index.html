<!DOCTYPE html>
<html>

<head>
<title>? Club</title>

<style>

body{
font-family: Arial, sans-serif;
text-align:center;
background: linear-gradient(135deg,#0d1117,#161b22,#0d1117);
color:white;
margin:0;
padding:20px;
}

/* HEADER CARD */

.header{
background: rgba(255,255,255,0.05);
padding:25px;
border-radius:15px;
width:80%;
margin:auto;
box-shadow:0 8px 25px rgba(0,0,0,0.6);
backdrop-filter: blur(6px);
}

/* CLUB TITLE */

.club-title{
font-size:42px;
letter-spacing:3px;
margin:0;
background: linear-gradient(90deg,#58a6ff,#9be9ff);
-webkit-background-clip:text;
color:transparent;
}

/* TAGLINE */

.tagline{
margin-top:8px;
font-size:16px;
color:#8b949e;
font-style:italic;
}

/* POSTER GRID */

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
margin-top:40px;
}

/* POSTER CARD */

.poster-card{
background:#161b22;
padding:12px;
border-radius:14px;
box-shadow:0 6px 20px rgba(0,0,0,0.7);
transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.poster-card:hover{
transform: translateY(-8px);
box-shadow:0 10px 35px rgba(0,150,255,0.4);
}

/* POSTER IMAGE */

.poster-card img{
width:260px;
border-radius:10px;
}

/* VIDEO SECTION */

.video-section{
margin-top:70px;
padding:30px;
background:#161b22;
border-radius:15px;
width:80%;
margin-left:auto;
margin-right:auto;
box-shadow:0 6px 25px rgba(0,0,0,0.6);
}

.video-section h2{
margin-bottom:20px;
}

/* VIDEO */

video{
width:100%;
max-width:700px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.7);
}

footer{
margin-top:50px;
color:#8b949e;
font-size:14px;
}

</style>

</head>

<body>

<div class="header">

<h1 class="club-title">? Club</h1>
<p class="tagline">Powered by Mathematics</p>

</div>


<div class="container">

<div class="poster-card">
<img src="poster1.jpg">
</div>

<div class="poster-card">
<img src="poster2.jpg">
</div>

<div class="poster-card">
<img src="poster3.jpg">
</div>

<div class="poster-card">
<img src="poster4.jpg">
</div>

</div>


<div class="video-section">

<h2>Watch the Explanation Video</h2>

<video controls>
<source src="video.mp4.mp4" type="video/mp4">
</video>

</div>

<footer>
Math Club Exhibition
</footer>

</body>
</html>
